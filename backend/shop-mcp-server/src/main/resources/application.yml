server:
  port: 8088

spring:
  application:
    name: shop-mcp-server
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
      config:
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
        file-extension: yaml

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.shophelper: debug
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{requestId:-}] %-5level %logger{36} - %msg%n"
