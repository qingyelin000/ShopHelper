server:
  port: 8080

spring:
  application:
    name: shop-gateway
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
      config:
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
        file-extension: yaml
        import-check:
          enabled: false
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: shop-auth
          uri: lb://shop-auth
          predicates:
            - Path=/api/v1/auth/**
        - id: shop-user
          uri: lb://shop-user
          predicates:
            - Path=/api/v1/users/**
        - id: shop-recommendation
          uri: lb://shop-user
          predicates:
            - Path=/api/v1/recommendations/**
        - id: shop-product
          uri: lb://shop-product
          predicates:
            - Path=/api/v1/products/**
        - id: shop-search
          uri: lb://shop-search
          predicates:
            - Path=/api/v1/search/**
        - id: shop-cart
          uri: lb://shop-cart
          predicates:
            - Path=/api/v1/cart/**
        - id: shop-order
          uri: lb://shop-order
          predicates:
            - Path=/api/v1/orders/**
        - id: shop-seckill
          uri: lb://shop-seckill
          predicates:
            - Path=/api/v1/seckill/**
        - id: shop-mcp-server
          uri: lb://shop-mcp-server
          predicates:
            - Path=/api/v1/agent/**

shop:
  jwt:
    secret: ${SHOP_JWT_SECRET:${AUTH_JWT_SECRET:shophelper-auth-jwt-secret-please-change-at-once}}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.shophelper: debug
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{requestId:-}] %-5level %logger{36} - %msg%n"
